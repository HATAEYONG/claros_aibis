# Prometheus Configuration for Claros MIS-AI Dashboard

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'claros-mis'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Backend application metrics
  - job_name: 'claros-backend'
    static_configs:
      - targets: ['backend:8000']
        labels:
          app: 'claros-mis'
          component: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Celery worker metrics (if exposed)
  - job_name: 'celery-worker'
    static_configs:
      - targets: ['celery-worker:9540']
        labels:
          app: 'claros-mis'
          component: 'celery'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis exporter (optional)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # PostgreSQL exporter (optional)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Node exporter (system metrics)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
