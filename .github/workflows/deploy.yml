name: Claros MIS AI Dashboard CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: claros_mis_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./claros-mis-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov flake8 black

      - name: Lint with flake8
        working-directory: ./claros-mis-backend
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Format check with black
        working-directory: ./claros-mis-backend
        run: black --check .

      - name: Run migrations
        working-directory: ./claros-mis-backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/claros_mis_test
          SECRET_KEY: test-secret-key
          DEBUG: True
        run: |
          python manage.py migrate --noinput

      - name: Run tests
        working-directory: ./claros-mis-backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/claros_mis_test
          SECRET_KEY: test-secret-key
          DEBUG: True
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./claros-mis-backend/coverage.xml
          flags: backend
          name: backend-coverage

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./claros-mis-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./claros-mis-frontend
        run: npm ci

      - name: Lint with ESLint
        working-directory: ./claros-mis-frontend
        run: npm run lint --if-present

      - name: Type check with TypeScript
        working-directory: ./claros-mis-frontend
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: ./claros-mis-frontend
        run: npm run test:unit --if-present

      - name: Run component tests
        working-directory: ./claros-mis-frontend
        run: npm run test:component --if-present

      - name: Build frontend
        working-directory: ./claros-mis-frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./claros-mis-frontend/dist
          retention-days: 7

  # Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Bandit security linter (Python)
        working-directory: ./claros-mis-backend
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true

      - name: Run npm audit (JavaScript)
        working-directory: ./claros-mis-frontend
        run: npm audit --audit-level=moderate --json > npm-audit.json || true

  # Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./claros-mis-backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/claros-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/claros-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/claros-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/claros-backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./claros-mis-frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/claros-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/claros-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/claros-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/claros-frontend:buildcache,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.claros-mis.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/claros-mis
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f

      - name: Run smoke tests
        run: |
          curl -f ${{ secrets.STAGING_URL }}/api/health/ || exit 1

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://claros-mis.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/claros-mis
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f

      - name: Run smoke tests
        run: |
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health/ || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # Performance Testing
  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            ${{ secrets.STAGING_URL }}
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Run k6 load tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: ./tests/load/k6.js
        env:
          TEST_URL: ${{ secrets.STAGING_URL }}
