<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .test-section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #333; margin-bottom: 30px; }
    h2 { color: #4F46E5; margin-bottom: 15px; font-size: 18px; }
    .test-btn {
      background: #4F46E5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    .test-btn:hover { background: #4338CA; }
    .test-btn:disabled { background: #9CA3AF; cursor: not-allowed; }
    .result {
      background: #1F2937;
      color: #10B981;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
    .error {
      background: #FEE2E2;
      color: #DC2626;
      border: 1px solid #FECACA;
    }
    .success {
      background: #D1FAE5;
      color: #065F46;
      border: 1px solid #A7F3D0;
    }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-ok { background: #D1FAE5; color: #065F46; }
    .status-error { background: #FEE2E2; color: #DC2626; }
  </style>
</head>
<body>
  <h1>🤖 AI Assistant 기능 테스트</h1>

  <!-- Backend API Test -->
  <div class="test-section">
    <h2>1. 백엔드 API 연결 테스트</h2>
    <button class="test-btn" onclick="testBackendHealth()">Health Check</button>
    <button class="test-btn" onclick="testSQLExecution()">SQL 실행 테스트</button>
    <div id="backend-result" class="result">결과가 여기에 표시됩니다...</div>
  </div>

  <!-- Text-to-SQL Test -->
  <div class="test-section">
    <h2>2. Text-to-SQL 생성 테스트</h2>
    <input type="text" id="sql-question" placeholder="질문 입력 (예: 사원 목록 조회)"
           style="width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
    <button class="test-btn" onclick="testTextToSQL()">SQL 생성</button>
    <div id="sql-result" class="result">SQL 생성 결과가 여기에 표시됩니다...</div>
  </div>

  <!-- Vector Search Test -->
  <div class="test-section">
    <h2>3. 벡터 검색 테스트 (관련 테이블 찾기)</h2>
    <input type="text" id="vector-question" placeholder="질문 입력 (예: 급여 현황)"
           style="width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
    <button class="test-btn" onclick="testVectorSearch()">관련 테이블 검색</button>
    <div id="vector-result" class="result">벡터 검색 결과가 여기에 표시됩니다...</div>
  </div>

  <!-- LLM Test -->
  <div class="test-section">
    <h2>4. LLM 연결 테스트</h2>
    <button class="test-btn" onclick="testLLMSettings()">LLM 설정 확인</button>
    <button class="test-btn" onclick="testLLMGenerate()">LLM 생성 테스트</button>
    <div id="llm-result" class="result">LLM 테스트 결과가 여기에 표시됩니다...</div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000/api';

    // Utility function to update result display
    function showResult(elementId, message, isError = false) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = isError ? 'result error' : 'result';
    }

    // 1. Backend Health Test
    async function testBackendHealth() {
      showResult('backend-result', '테스트 중...');
      try {
        const response = await fetch(`${API_BASE}/health/`);
        const data = await response.json();
        showResult('backend-result', `✅ Backend 상태:\n${JSON.stringify(data, null, 2)}`);
      } catch (error) {
        showResult('backend-result', `❌ 오류: ${error.message}`, true);
      }
    }

    // SQL Execution Test
    async function testSQLExecution() {
      showResult('backend-result', 'SQL 실행 테스트 중...');
      try {
        const response = await fetch(`${API_BASE}/sql/execute/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sql: 'SELECT 1 as test, CURRENT_DATE as today'
          })
        });
        const data = await response.json();
        showResult('backend-result', `✅ SQL 실행 결과:\n${JSON.stringify(data, null, 2)}`);
      } catch (error) {
        showResult('backend-result', `❌ 오류: ${error.message}`, true);
      }
    }

    // 2. Text-to-SQL Test (simulate the service logic)
    async function testTextToSQL() {
      const question = document.getElementById('sql-question').value || '사원 목록 조회';
      showResult('sql-result', 'SQL 생성 중...\n\n(실제로는 vectorSearchService와 textToSqlService를 사용합니다)\n\n데이터베이스 스키마:');

      // Database schema preview
      const tables = [
        'HR_EMPLOYEE (사원정보)',
        'HR_DEPARTMENT (부서정보)',
        'PAY_SALARY (급여정보)',
        'MM_INVENTORY (재고현황)',
        'SD_SALES (매출실적)',
        'PP_PRODUCTION (생산실적)',
        'QM_INSPECTION (품질검사)'
      ];

      // Simple matching simulation
      const relevantTables = tables.filter(t => {
        const lowerQ = question.toLowerCase();
        if (lowerQ.includes('사원') || lowerQ.includes('직원')) return t.includes('EMPLOYEE');
        if (lowerQ.includes('부서')) return t.includes('DEPARTMENT');
        if (lowerQ.includes('급여') || lowerQ.includes('월급')) return t.includes('SALARY');
        if (lowerQ.includes('재고')) return t.includes('INVENTORY');
        if (lowerQ.includes('매출') || lowerQ.includes('판매')) return t.includes('SALES');
        if (lowerQ.includes('생산')) return t.includes('PRODUCTION');
        if (lowerQ.includes('품질') || lowerQ.includes('검사')) return t.includes('INSPECTION');
        return false;
      });

      // Generate SQL based on question
      let sql = '';
      if (question.includes('사원') || question.includes('직원')) {
        sql = `SELECT
  emp_id AS "사원번호",
  emp_name AS "사원명",
  dept_code AS "부서코드",
  position AS "직급",
  hire_date AS "입사일",
  status AS "재직상태"
FROM HR_EMPLOYEE
ORDER BY hire_date DESC
LIMIT 100;`;
      } else if (question.includes('급여') || question.includes('월급')) {
        sql = `SELECT
  emp_id AS "사원번호",
  pay_year AS "지급년도",
  pay_month AS "지급월",
  base_salary AS "기본급",
  total_pay AS "총지급액",
  net_pay AS "실수령액"
FROM PAY_SALARY
WHERE pay_year = EXTRACT(YEAR FROM CURRENT_DATE)
  AND pay_month = EXTRACT(MONTH FROM CURRENT_DATE)
ORDER BY total_pay DESC;`;
      } else if (question.includes('매출') || question.includes('판매')) {
        sql = `SELECT
  sales_date AS "매출일",
  customer_code AS "고객코드",
  product_code AS "제품코드",
  quantity AS "판매수량",
  amount AS "매출금액"
FROM SD_SALES
WHERE sales_date >= DATE_TRUNC('month', CURRENT_DATE)
ORDER BY sales_date DESC, amount DESC;`;
      } else {
        sql = `-- "${question}"에 대한 SQL 쿼리
SELECT * FROM relevant_table
WHERE conditions = true
ORDER BY date DESC
LIMIT 100;`;
      }

      const result = `📝 질문: ${question}

🎯 관련 테이블:
${relevantTables.length > 0 ? relevantTables.map(t => '  • ' + t).join('\n') : '  • 전체 테이블 검색 필요'}

📊 생성된 SQL:
${sql}

💡 AI 어시스턴트는 vectorSearchService를 사용하여 관련 테이블을 찾고,
   textToSqlService를 사용하여 자연어를 SQL로 변환합니다.`;

      showResult('sql-result', result);
    }

    // 3. Vector Search Test (simulation)
    async function testVectorSearch() {
      const question = document.getElementById('vector-question').value || '급여 현황';

      // Simulated vector search results
      const tableData = [
        { name: 'HR_EMPLOYEE', korean: '사원정보', keywords: ['사원', '직원', '인력', '입사'] },
        { name: 'HR_DEPARTMENT', korean: '부서정보', keywords: ['부서', '조직', '팀'] },
        { name: 'PAY_SALARY', korean: '급여정보', keywords: ['급여', '월급', '임금', '연봉', '상여', '보너스'] },
        { name: 'MM_INVENTORY', korean: '재고현황', keywords: ['재고', '창고', '입고', '출고', '자재'] },
        { name: 'SD_SALES', korean: '매출실적', keywords: ['매출', '판매', '영업', '매출액'] },
        { name: 'PP_PRODUCTION', korean: '생산실적', keywords: ['생산', '생산량', '양품', '불량', '수율'] },
        { name: 'QM_INSPECTION', korean: '품질검사', keywords: ['품질', '검사', '합격', '불합격', '불량률'] }
      ];

      // Calculate similarity scores
      const results = tableData.map(table => {
        let score = 0;
        const matchedKeywords = [];

        for (const keyword of table.keywords) {
          if (question.toLowerCase().includes(keyword)) {
            score += 20;
            matchedKeywords.push(keyword);
          }
        }

        if (question.toLowerCase().includes(table.korean.toLowerCase())) {
          score += 30;
          matchedKeywords.push(table.korean);
        }

        return { ...table, score, matchedKeywords };
      }).filter(t => t.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

      let output = `🔍 질문: "${question}"

📊 벡터 검색 결과 (유사도 순):
`;
      if (results.length === 0) {
        output += `⚠️ 관련 테이블을 찾을 수 없습니다.
다음 키워드 중 하나를 포함해 보세요:
사원, 직원, 부서, 급여, 월급, 재고, 매출, 생산, 품질`;
      } else {
        results.forEach((r, i) => {
          output += `\n${i + 1}. ${r.korean} (${r.name})
   유사도: ${r.score}%
   매칭 키워드: ${r.matchedKeywords.join(', ') || '시맨틱 유사도'}`;
        });
      }

      output += `\n
💡 vectorSearchService는 다음을 수행합니다:
   • TF-IDF 기반 토큰화 (한글/영어)
   • 코사인 유사도 계산
   • 테이블/컬럼/샘플쿼리 인덱싱
   • 쿼리 히스토리 저장 (localStorage)`;

      showResult('vector-result', output);
    }

    // 4. LLM Settings Test
    async function testLLMSettings() {
      showResult('llm-result', 'LLM 설정 확인 중...\n\n(이 기능은 LLM 설정 페이지에서 구성 가능)\n\n지원되는 LLM:\n• Ollama (로컬 오픈소스)\n• ChatGPT (OpenAI)\n• Gemini (Google)');
    }

    async function testLLMGenerate() {
      showResult('llm-result', 'LLM 생성 테스트는 실제 API 키가 필요합니다.\n\n설정 페이지에서 LLM을 구성한 후 사용해 주세요.\n\nURL: http://localhost:3001/llmSettings');
    }
  </script>
</body>
</html>
